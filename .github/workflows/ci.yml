name: CI

on:
  push:
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: paygate_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d paygate_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
          
    env:
      STRIPE_SECRET_KEY: test
      STRIPE_WEBHOOK_SECRET: test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5433/paygate_test
      APP_BASE_URL: http://test
      ORDERS_API_KEY: test

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check

      - name: Mypy check
        run: mypy app

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80